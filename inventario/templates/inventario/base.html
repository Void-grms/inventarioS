{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e7c86">
  <title>Inventario · Renacer Otuzco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="{% static 'inventario/app.css' %}" rel="stylesheet">
</head>
<body>
{% if user.is_authenticated %}
<header class="topbar">
  <a class="topbar__brand" href="{% url 'avance' %}"><span class="dot"></span> Inventario</a>
  <div class="topbar__actions">
    <a class="iconbtn" href="{% url 'buscar' %}" aria-label="Buscar">🔍</a>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button class="iconbtn" aria-label="Salir">⎋</button>
    </form>
  </div>
</header>
{% endif %}

{% block body %}
<main class="wrap">
  {% if messages %}
    {% for m in messages %}
      <div class="alert alert--{% if m.tags == 'error' %}err{% elif m.tags == 'success' %}ok{% else %}info{% endif %}">{{ m }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</main>
{% endblock %}
</body>
</html>
