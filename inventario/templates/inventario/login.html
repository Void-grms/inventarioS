{% extends "inventario/base.html" %}
{% block body %}
<div class="auth">
  <div class="auth__card reveal">
    <div class="auth__logo"><span class="dot"></span> Inventario Renacer Otuzco</div>
    <p class="page-sub">Verificación de bienes patrimoniales</p>
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label>Usuario</label>
        <input name="username" class="input" autofocus required autocapitalize="off">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input name="password" type="password" class="input" required>
      </div>
      {% if form.errors %}<div class="alert alert--err">Usuario o clave incorrectos.</div>{% endif %}
      <button class="btn btn--primary btn--block">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
